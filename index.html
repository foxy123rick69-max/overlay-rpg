<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: white;
      padding: 10px;
    }

    button {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #555;
    }

    #viewer {
      margin-top: 10px;
      width: 100%;
      height: 200px;
      background-size: cover;
      background-position: center;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h3>Cenas</h3>

<button onclick="trocar('folha')">🌿 Vila da Folha</button>
<button onclick="trocar('nevoa')">🌫️ Vila da Névoa</button>

</body>
</html>
